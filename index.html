<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Albion Market Pro AI</title>

<style>
body{
background:#0d1117;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}
.card{
background:#161b22;
padding:20px;
border-radius:15px;
margin-top:20px;
}
button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#238636;
color:white;
}
</style>
</head>
<body>

<h1>⚔ Albion Market Pro AI</h1>

<div class="card">
<h2>Preço do Ouro</h2>
<p id="gold">Carregando...</p>

<button onclick="buscar()">Atualizar</button>
</div>

<script>
async function buscar(){
try{
let r = await fetch(
'https://www.albion-online-data.com/api/v2/stats/prices/T4_BAG'
);

let dados = await r.json();

document.getElementById("gold").innerText=
"Item: "+dados[0].item_id+
" | Cidade: "+dados[0].city+
" | Preço: "+dados[0].sell_price_min;
}
catch{
document.getElementById("gold").innerText=
"Erro ao carregar dados";
}
}

buscar();
</script>

</body>
</html>
